name: Deploy static site to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate static site
        run: |
          test -f public/index.html
          test -f public/app.js
          test -f public/guides.json
          node --check public/app.js
          node -e "const fs=require('fs'); const guides=JSON.parse(fs.readFileSync('public/guides.json','utf8')).guides; if (!Array.isArray(guides) || !guides.length || guides.some(g => !g.url || g.url.startsWith('/') || !fs.existsSync('public/' + g.url))) process.exit(1);"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
